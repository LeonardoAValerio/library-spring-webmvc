<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
<div class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold text-green-600 mb-8">Editando usuário</h1>

  <div class="bg-white rounded-lg shadow-md p-6">
    <form th:action="@{/usuarios/atualizar/{id}(id=${usuario.id})}" th:object="${usuario}" method="POST">
      <div class="mb-4">
        <label for="nome" class="block text-gray-700 font-semibold mb-2">Nome</label>
        <input type="text" id="nome" th:field="*{nome}" required
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
        <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="text-red-500"></span>
      </div>

      <div class="mb-4">
        <label for="senha" class="block text-gray-700 font-semibold mb-2">Senha</label>
        <input type="text" id="senha" th:field="*{senha}" required
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
        <span th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}" class="text-red-500"></span>
      </div>

      <div class="mb-4">
        <label for="endereco" class="block text-gray-700 font-semibold mb-2">Endereco</label>
        <input type="text" id="endereco" th:field="*{endereco}" required
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
        <span th:if="${#fields.hasErrors('endereco')}" th:errors="*{endereco}" class="text-red-500"></span>
      </div>

      <div class="mb-4">
        <label for="telefone" class="block text-gray-700 font-semibold mb-2">Telefone</label>
        <input type="number" id="telefone" th:field="*{telefone}" required
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
        <span th:if="${#fields.hasErrors('endereco')}" th:errors="*{telefone}" class="text-red-500"></span>
      </div>

      <div class="mb-4">
        <label for="email" class="block text-gray-700 font-semibold mb-2">email</label>
        <input type="text" id="email" th:field="*{email}"
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500"></span>
      </div>

      <div class="flex justify-between mt-6">
        <a href="/usuarios/listar" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600">Cancelar</a>
        <button type="submit" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600">Salvar</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
