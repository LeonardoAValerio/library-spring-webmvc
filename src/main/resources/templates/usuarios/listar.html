<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-green-600 mb-8">Usuários</h1>
        <table class="w-full bg-white shadow-md rounded-lg">
            <thead>
            <tr>
                <th class="py-2 px-4 bg-green-500 text-white">Nome</th>
                <th class="py-2 px-4 bg-green-500 text-white">Telefone</th>
                <th class="py-2 px-4 bg-green-500 text-white">Endereco</th>
                <th class="py-2 px-4 bg-green-500 text-white">Email</th>
                <th class="py-2 px-4 bg-green-500 text-white">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="usuario : ${usuarios}">
                <td class="py-2 px-4 border-b" th:text="${usuario.nome}"></td>
                <td class="py-2 px-4 border-b" th:text="${usuario.telefone}"></td>
                <td class="py-2 px-4 border-b" th:text="${usuario.endereco}"></td>
                <td class="py-2 px-4 border-b" th:text="${usuario.email}"></td>
                <td class="py-2 px-4 border-b">
                    <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" class="text-blue-500 hover:underline">Editar</a>
                    <a th:href="@{/usuarios/deletar/{id}(id=${usuario.id})}" class="text-blue-500 hover:underline">Deletar</a>
                </td>
            </tr>
            </tbody>
        </table>
        <a href="./novo" class="mt-4 inline-block bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">Adicionar Usuário</a>
    </div>
</body>
</html>
